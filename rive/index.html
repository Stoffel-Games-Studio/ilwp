<!DOCTYPE html>
<html lang="en">
<body style="margin: 0; background-color:#222222;">
<div id="button">
    <canvas id="canvas" style="display: block; background-color: #222222;"></canvas>
</div>
    
<script src="rive.js"></script>
    
<script>
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Fill the canvas, cropping Rive if necessary
    let layout = new rive.Layout({
        fit: rive.Fit.Cover,
    });

    const r = new rive.Rive({
        src: `https://appassets.androidplatform.net/storage/file.riv`,
        canvas: document.getElementById('canvas'),
        autoplay: true,
        autoBind: true,
        stateMachines: 'State Machine 1',
        layout: layout,

        onLoad: () => {
            const vmi = r.viewModelInstance;

            // Function to update time and date
            function updateDateTime() {
                const now = new Date();

                // Format time as HH:MM
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');

                // Format date as "DAY DD MON" (e.g., "MON 14 JAN")
                const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                               'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

                const dayName = days[now.getDay()];
                const date = String(now.getDate()).padStart(2, '0');
                const monthName = months[now.getMonth()];
                const dateString = `${dayName} ${date} ${monthName}`;

                // Update the Rive view model
                vmi.string('stringDate').value = dateString;
                vmi.string('stringHours').value = hours;
                vmi.string('stringMinutes').value = minutes;
            }

            // Update immediately on load
            updateDateTime();

            // Update every second (1000 milliseconds)
            setInterval(updateDateTime, 1000);
        }
    });

</script>
</body>
</html>
