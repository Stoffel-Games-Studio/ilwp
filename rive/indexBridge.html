<!DOCTYPE html>
<html lang="en">
<body style="margin: 0; background-color:#222222;">
<div id="button">
    <canvas id="canvas" style="display: block; background-color: #222222;"></canvas>
</div>
<script src="rive.js"></script>
<script>
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    async function init() {
        const response = await fetch('https://appassets.androidplatform.net/storage/file.riv');
        const buffer = await response.arrayBuffer();

        let layout = new rive.Layout({
            fit: rive.Fit.Cover,
        });

        const r = new rive.Rive({
            buffer: buffer,
            canvas: document.getElementById('canvas'),
            autoplay: true,
            autoBind: true,
            stateMachines: 'State Machine 1',
            layout: layout,
            onLoad: () => {
                const vmi = r.viewModelInstance;
                function updateDateTime() {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const months = ['JAN','FEB','MAR','APR','MAY','JUN',
                                    'JUL','AUG','SEP','OCT','NOV','DEC'];
                    const date = String(now.getDate()).padStart(2, '0');
                    const monthName = months[now.getMonth()];
                    vmi.string('stringTime').value = `${hours}:${minutes}`;
                    vmi.string('stringDate').value = date;
                    vmi.string('stringMonth').value = monthName;
                }
                updateDateTime();
                setInterval(updateDateTime, 1000);
            },
            onLoadError: (e) => { console.error('Rive load error:', JSON.stringify(e)); }
        });  // ← closes new rive.Rive({
    }    // ← closes async function init()

    init().catch(e => console.error('Init error:', e));
</script>
</body>
</html>
